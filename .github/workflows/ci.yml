name: CI

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Python syntax check
        run: python -m py_compile backend/app.py backend/services/document_loader.py backend/services/index_service.py backend/services/qa_service.py

      - name: Start app and smoke test
        run: |
          python backend/app.py > /tmp/app.log 2>&1 &
          APP_PID=$!
          sleep 2
          curl -f http://127.0.0.1:8000 > /tmp/home.html
          kill $APP_PID
