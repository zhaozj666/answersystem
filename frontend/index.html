<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内部规章制度智能问答助手</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="app-rail" aria-label="应用导航">
      <div class="brand-mark" aria-hidden="true">知</div>
      <nav class="rail-nav">
        <button class="rail-item active" type="button" aria-label="问答">
          <span>问</span>
        </button>
        <button class="rail-item" type="button" aria-label="文档">
          <span>档</span>
        </button>
        <button class="rail-item" type="button" aria-label="设置">
          <span>设</span>
        </button>
      </nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <div class="eyebrow">企业知识库</div>
          <h1>内部规章制度智能问答助手</h1>
          <p>基于内部制度文档的本地知识库问答系统</p>
        </div>
        <div class="runtime-card" aria-live="polite">
          <span class="status-dot"></span>
          <div>
            <strong>本地运行</strong>
            <span id="kbStatus">正在读取状态...</span>
          </div>
        </div>
      </header>

      <section class="content-grid">
        <aside class="knowledge-panel panel">
          <div class="panel-header">
            <div>
              <p class="section-label">知识库状态</p>
              <h2>制度文档</h2>
            </div>
            <span class="soft-badge">Local</span>
          </div>

          <dl class="meta-list">
            <div>
              <dt>文档目录</dt>
              <dd>docs/policies/</dd>
            </div>
            <div>
              <dt>支持格式</dt>
              <dd>PDF、DOCX、TXT、MD</dd>
            </div>
            <div>
              <dt>当前文件数</dt>
              <dd><span id="fileCount">0</span> 个</dd>
            </div>
            <div>
              <dt>当前片段数</dt>
              <dd><span id="chunkCount">0</span> 个</dd>
            </div>
            <div>
              <dt>最近索引时间</dt>
              <dd id="lastIndexedAt">暂无</dd>
            </div>
          </dl>

          <button id="reindexBtn" class="primary-btn" type="button">
            <span class="btn-icon" aria-hidden="true">↻</span>
            重建索引
          </button>
          <p id="reindexResult" class="helper-text">更新文档后，请重新建立知识库索引。</p>
        </aside>

        <section class="qa-panel panel">
          <div class="panel-header">
            <div>
              <p class="section-label">智能检索</p>
              <h2>向制度文档提问</h2>
            </div>
          </div>

          <div class="question-box">
            <textarea id="questionInput" placeholder="请输入你想查询的制度问题，例如：什么是公司的正式员工？"></textarea>
            <div class="quick-questions" aria-label="示例问题">
              <button class="quick-btn" type="button">什么是公司的正式员工？</button>
              <button class="quick-btn" type="button">试用期是多久？</button>
              <button class="quick-btn" type="button">迟到早退如何处罚？</button>
              <button class="quick-btn" type="button">年假规则是什么？</button>
            </div>
            <div class="action-row">
              <button id="askBtn" class="primary-btn" type="button">提问</button>
              <span id="askStatus" class="helper-text" aria-live="polite">请输入问题后点击提问。</span>
            </div>
          </div>

          <div class="answer-card">
            <div class="answer-title">
              <span class="answer-icon" aria-hidden="true">A</span>
              <h3>回答</h3>
            </div>
            <div id="answerText" class="answer-text empty">等待提问后显示检索结果。</div>
          </div>

          <div class="sources-card">
            <div class="answer-title">
              <span class="answer-icon secondary" aria-hidden="true">引</span>
              <h3>引用来源</h3>
            </div>
            <div id="sources" class="sources-list">
              <p class="muted">暂无引用来源</p>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
